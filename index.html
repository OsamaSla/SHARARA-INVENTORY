<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>מחסן שרארה v2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--brd:#2a3044;--txt:#cbd5e1;--mut:#64748b;--ci:#f59e0b;--ct:#3b82f6;--cr:#22c55e;--cc:#a855f7;--ce:#f97316}
*{font-family:'Heebo',sans-serif;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);min-height:100vh;display:flex;font-size:14px;overflow-x:hidden}
.vw{display:none}.vw.on{display:block;animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.nb{width:100%;text-align:right;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
.nb:hover{background:rgba(255,255,255,.05);color:var(--txt)}.nb.on{background:color-mix(in srgb,var(--ac) 18%,transparent);color:var(--ac);font-weight:700}
.pill{cursor:pointer;padding:4px 13px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid var(--brd);background:var(--card);color:var(--mut);white-space:nowrap;transition:.2s;user-select:none}
.pill:hover{color:var(--txt)}.pill.on{background:var(--ci);border-color:var(--ci);color:#000}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;align-items:center;justify-content:center;backdrop-filter:blur(3px)}.mb.on{display:flex}
.mx{background:var(--card);border:1px solid #374151;border-radius:12px;padding:24px;width:380px;max-width:95vw;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}
input,select,textarea{background:var(--bg)!important;border:1px solid var(--brd)!important;color:#fff!important;padding:8px 11px!important;border-radius:6px!important;width:100%!important;font-family:Heebo,sans-serif!important;outline:none!important;transition:.2s!important}
input:focus,select:focus,textarea:focus{border-color:#475569!important}
.ti{background:transparent!important;border:none!important;padding:4px 6px!important;text-align:right;width:auto!important}.ti:focus{background:var(--bg)!important;box-shadow:0 0 0 1px var(--ct)!important;border-radius:4px!important}
th{background:#12151e;padding:11px 12px;font-size:12px;font-weight:600;color:var(--mut);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:5;text-align:right}
tr{border-bottom:1px solid var(--brd);transition:.15s}tr:last-child{border:none}tr:hover{background:rgba(255,255,255,.04)}tr:nth-child(even){background:rgba(255,255,255,.02)}
td{padding:9px 12px;vertical-align:middle}
.bdg{position:absolute;top:7px;left:7px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.bdg.lst{position:relative;top:0;left:0;display:inline-block;margin-right:8px}
.bl{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#ef4444}
.bz{background:rgba(239,68,68,.3);border:1px solid #ef4444;color:#fca5a5}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center}
.tm{padding:9px 20px;border-radius:8px;font-weight:600;font-size:13px;background:var(--card);border:1px solid #374151;animation:tIn .3s ease,tOut .3s 2.2s forwards}
.tm.ok{border-color:rgba(34,197,94,.5);color:#22c55e}.tm.er{border-color:rgba(239,68,68,.5);color:#ef4444}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}@keyframes tOut{to{opacity:0}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.hdr-sel{appearance:none;background:transparent!important;border:none!important;color:var(--mut)!important;font-weight:bold!important;padding:0!important;cursor:pointer;width:auto!important}
.hdr-sel option{background:var(--card);color:var(--txt)}
</style></head><body class="min-h-screen flex text-sm">
<aside class="flex flex-col h-screen sticky top-0 flex-shrink-0" style="width:210px;background:var(--card);border-left:1px solid var(--brd)">
  <div class="p-5 border-b font-black text-white text-lg flex gap-2 items-center" style="border-color:var(--brd)">🏭 <span style="color:var(--ci)">מחסן</span> שרארה</div>
  <nav class="p-2 flex flex-col gap-1 flex-1">
    <button class="nb on" style="--ac:var(--ci)" data-v="Items" onclick="R.go('Items')">📦 ניהול פריטים</button>
    <button class="nb" style="--ac:var(--ct)" data-v="Transactions" onclick="R.go('Transactions')">📑 יומן ניפוקים</button>
    <button class="nb" style="--ac:var(--cr)" data-v="Restocks" onclick="R.go('Restocks')">📥 כניסות מלאי</button>
    <button class="nb" style="--ac:var(--cc)" data-v="Categories" onclick="R.go('Categories')">🏷️ קטגוריות</button>
    <button class="nb" style="--ac:var(--ce)" data-v="Employees" onclick="R.go('Employees')">👥 עובדים</button>
  </nav>
  <div class="p-4 text-xs" style="color:var(--mut);border-top:1px solid var(--brd)">מחסן שרארה v2.5</div>
</aside>
<div class="flex-1 flex flex-col" style="overflow:hidden;height:100vh">
  <header class="flex items-center gap-3 px-5 sticky top-0 z-40 flex-shrink-0" style="height:56px;background:var(--card);border-bottom:1px solid var(--brd)">
    <h1 id="vT" class="font-black text-base" style="color:var(--ci)">📦 ניהול פריטים</h1>
    <button id="btnNew" onclick="U.openItemModal()" class="text-xs font-bold text-white px-4 py-1.5 rounded-lg hover:brightness-110 transition-all" style="background:var(--cr)">+ חדש</button>
    <div class="flex-1"></div>
    <div id="vToggle" class="flex bg-[#1a1d27] rounded-lg overflow-hidden border border-[#2a3044]">
      <button id="vGrid" onclick="U.setView('grid')" class="px-2 py-1 transition-all" style="background:var(--ci);color:#000">🔲</button>
      <button id="vList" onclick="U.setView('list')" class="px-2 py-1 transition-all" style="color:var(--mut)">☰</button>
    </div>
    <select id="sSort" class="!w-auto !text-xs !py-1.5 !px-2" onchange="U.ri()"><option value="name">שם (א-ת)</option><option value="sl">מלאי נמוך</option><option value="sh">מלאי גבוה</option></select>
    <button onclick="document.getElementById('impFile').click()" class="text-xs px-2 py-1.5 rounded-lg font-bold transition-all hover:brightness-125" style="background:var(--card);border:1px solid var(--brd);color:var(--txt)">📥 ייבוא</button>
    <button onclick="A.exportJson()" class="text-xs px-2 py-1.5 rounded-lg font-bold transition-all hover:brightness-125" style="background:var(--card);border:1px solid var(--brd);color:var(--txt)">📤 ייצוא</button>
    <input type="file" id="impFile" style="display:none" accept=".json" onchange="A.importJson(event)">
    <button onclick="S.undo()" class="text-xs px-3 py-1.5 rounded-lg font-bold transition-all hover:brightness-125" style="background:var(--card);border:1px solid var(--brd);color:var(--txt)">↩ UNDO</button>
    <button onclick="S.redo()" class="text-xs px-3 py-1.5 rounded-lg font-bold transition-all hover:brightness-125" style="background:var(--card);border:1px solid var(--brd);color:var(--txt)">↪ REDO</button>
    <input id="srch" type="search" placeholder="חיפוש פריט..." oninput="U.ri()" class="!w-36 !text-xs">
  </header>
  <div id="fbarMain" class="flex gap-2 overflow-x-auto p-2 border-b flex-shrink-0" style="background:var(--card);border-color:var(--brd)"></div>
  <div id="fbarSub" class="flex gap-2 overflow-x-auto p-2.5 flex-shrink-0" style="background:var(--bg);border-bottom:1px solid var(--brd);display:none"></div>
  <main class="flex-1 overflow-auto">
    <div id="vi-Items" class="vw on p-5"><div id="igrid"></div></div>
    
    <div id="vi-Transactions" class="vw">
      <div class="flex items-center gap-3 p-4 border-b" style="border-color:var(--brd);background:var(--card)">
        <input id="srchTx" type="search" placeholder="חיפוש ביומן ניפוקים..." oninput="U.rl('Transactions','bt')" class="!w-64 !text-xs">
        <button onclick="A.exportLog('Transactions')" class="text-xs px-3 py-1.5 rounded-lg font-bold transition-all hover:brightness-125" style="background:var(--card);border:1px solid var(--brd);color:var(--ct)">📥 ייצוא לאקסל</button>
      </div>
      <div class="m-5 rounded-xl overflow-hidden" style="border:1px solid var(--brd)">
        <table class="w-full"><thead><tr>
          <th>תמונה</th>
          <th>תאריך</th>
          <th id="thEmpTx">עובד</th>
          <th id="thItmTx">פריט</th>
          <th>כמות</th>
          <th>הערות</th>
          <th style="text-align:center">🗑</th>
        </tr></thead><tbody id="bt"></tbody></table>
      </div>
    </div>
    
    <div id="vi-Restocks" class="vw">
      <div class="flex items-center gap-3 p-4 border-b" style="border-color:var(--brd);background:var(--card)">
        <input id="srchRe" type="search" placeholder="חיפוש בכניסות מלאי..." oninput="U.rl('Restocks','br')" class="!w-64 !text-xs">
      </div>
      <div class="m-5 rounded-xl overflow-hidden" style="border:1px solid var(--brd)">
        <table class="w-full"><thead><tr>
          <th>תמונה</th>
          <th>תאריך</th>
          <th id="thItmRe">פריט</th>
          <th>כמות</th>
          <th>הערות</th>
          <th style="text-align:center">🗑</th>
        </tr></thead><tbody id="br"></tbody></table>
      </div>
    </div>
    
    <div id="vi-Categories" class="vw p-5">
      <div class="flex gap-2 mb-5 items-center">
        <input id="nMainCat" placeholder="קבוצה ראשית חדשה...">
        <button onclick="A.addMainCat()" class="px-5 py-2 rounded-lg font-bold text-white hover:brightness-110" style="background:var(--cc)">הוסף קבוצה</button>
        <div class="flex-1"></div>
        <input id="srchCat" type="search" placeholder="חיפוש קטגוריה..." oninput="U.rls('subCategories','lCat',true)" class="!w-64 !text-xs">
      </div>
      <div id="lCat" class="flex flex-col gap-5"></div>
    </div>
    
    <div id="vi-Employees" class="vw p-5">
      <div class="flex gap-2 mb-5 max-w-md items-center">
        <input type="color" id="nEmpColor" value="#f97316" class="!p-0 !w-10 !h-10 !rounded-full overflow-hidden cursor-pointer flex-shrink-0" style="border:none!important">
        <input id="nEmp" placeholder="עובד חדש...">
        <button onclick="A.addList('employees','nEmp','nEmpColor')" class="px-5 py-2 rounded-lg font-bold text-white hover:brightness-110" style="background:var(--ce)">הוסף</button>
        <div class="flex-1"></div>
        <input id="srchEmp" type="search" placeholder="חיפוש עובד..." oninput="U.rls('employees','lEmp',false)" class="!w-40 !text-xs">
      </div>
      <div id="lEmp" class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr))"></div>
    </div>
  </main>
</div>
<div id="mItem" class="mb"><div class="mx">
  <h2 class="text-white font-black text-base mb-5">✏️ ניהול פריט</h2>
  <input type="hidden" id="eKey">
  <div class="flex flex-col gap-3">
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">שם פריט</label><input id="iName" placeholder="שם..."></div>
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">מזהה ID</label><input id="iId" placeholder="ID..."></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">קבוצה ראשית</label><select id="iMainCat" onchange="U.udl(true)"></select></div>
      <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">תת קטגוריה</label><select id="iCat"></select></div>
    </div>
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">תמונה</label><input type="file" id="iImg" accept="image/*"></div>
    <div class="grid grid-cols-2 gap-3">
      <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">מלאי נוכחי</label><input type="number" id="iStock" placeholder="0"></div>
      <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">מינימום מלאי</label><input type="number" id="iMinStock" placeholder="0"></div>
    </div>
  </div>
  <div class="flex gap-2 mt-5">
    <button onclick="A.saveItem()" class="flex-1 py-2.5 rounded-lg font-bold text-white hover:brightness-110" style="background:var(--cr)">שמור</button>
    <button id="btnDelItem" onclick="A.deleteItem()" class="px-4 py-2.5 rounded-lg font-semibold text-white hover:brightness-110" style="background:#ef4444;display:none">מחק פריט</button>
    <button onclick="U.cm()" class="flex-1 py-2.5 rounded-lg font-semibold" style="background:#1e2333;color:var(--txt)">ביטול</button>
  </div>
</div></div>

<div id="mAct" class="mb"><div class="mx">
  <h2 id="aTitle" class="text-white font-black text-base mb-5">פעולה</h2>
  <div class="flex flex-col gap-3">
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">תאריך</label><input type="date" id="aDate"></div>
    <div id="empW"><label class="block text-xs font-bold mb-1" style="color:var(--mut)">עובד</label><input list="eDL" id="aEmp" placeholder="בחר עובד..."></div>
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">כמות</label><input type="number" id="aQty" placeholder="0"></div>
    <div><label class="block text-xs font-bold mb-1" style="color:var(--mut)">הערות</label><textarea id="aNotes" rows="2" placeholder="הערות..."></textarea></div>
  </div>
  <div class="flex gap-2 mt-5">
    <button id="cBtn" onclick="A.confirmMove()" class="flex-1 py-2.5 rounded-lg font-bold text-white hover:brightness-110"></button>
    <button onclick="U.cm()" class="flex-1 py-2.5 rounded-lg font-semibold" style="background:#1e2333;color:var(--txt)">ביטול</button>
  </div>
</div></div>

<div id="mLB" class="mb" onclick="U.cm()"><img id="lbI" src="" onclick="event.stopPropagation()" style="max-width:85vw;max-height:85vh;border-radius:12px;object-fit:contain"></div>

<datalist id="eDL"></datalist>
<div id="toast"></div>
<script>
// Migration script for old data structures
['employees'].forEach(k=>{const r=JSON.parse(localStorage.getItem(k));if(Array.isArray(r)){const c=r.filter(v=>typeof v==='string'&&v.trim()&&v!=='[object Object]');if(c.length!==r.length)localStorage.setItem(k,JSON.stringify(c));}});

let sc = JSON.parse(localStorage.getItem('subCategories'));
if(Array.isArray(sc)){
  const valid = sc.filter(v=>typeof v==='string'&&v.trim()&&v!=='[object Object]');
  sc = { 'כללי': valid };
  localStorage.setItem('subCategories', JSON.stringify(sc));
}
if(!sc || Object.keys(sc).length===0) sc = { 'כללי': ['כללי'] };

const S={
  d:{
    items:JSON.parse(localStorage.getItem('items'))||[],
    transactions:JSON.parse(localStorage.getItem('transactions'))||[],
    restocks:JSON.parse(localStorage.getItem('restocks'))||[],
    employees:JSON.parse(localStorage.getItem('employees'))||['עזאם שרארה'],
    subCategories:sc,
    colors:JSON.parse(localStorage.getItem('colors'))||{}
  },
  un:[],re:[],
  save(snap=true){
    if(snap){this.un.push(JSON.stringify(this.d));if(this.un.length>50)this.un.shift();this.re=[];}
    Object.keys(this.d).forEach(k=>localStorage.setItem(k,JSON.stringify(this.d[k])));
  },
  undo(){if(this.un.length){this.re.push(JSON.stringify(this.d));this.d=JSON.parse(this.un.pop());this.save(false);R.refresh();}},
  redo(){if(this.re.length){this.un.push(JSON.stringify(this.d));this.d=JSON.parse(this.re.pop());this.save(false);R.refresh();}}
};

const T={show(m,t='ok'){const e=document.createElement('div');e.className='tm '+t;e.textContent=m;document.getElementById('toast').appendChild(e);setTimeout(()=>e.remove(),2600);}};
const VIEWS={
  Items:       {title:'📦 ניהול פריטים', color:'var(--ci)',showNew:true},
  Transactions:{title:'📑 יומן ניפוקים',color:'var(--ct)',showNew:false},
  Restocks:    {title:'📥 כניסות מלאי', color:'var(--cr)',showNew:false},
  Categories:  {title:'🏷️ קטגוריות',    color:'var(--cc)',showNew:false},
  Employees:   {title:'👥 עובדים',       color:'var(--ce)',showNew:false}
};

const R={
  cur:'Items',
  go(v){
    this.cur=v;
    document.querySelectorAll('.vw').forEach(s=>s.classList.remove('on'));
    document.getElementById('vi-'+v).classList.add('on');
    document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
    const c=VIEWS[v];
    document.getElementById('vT').textContent=c.title;
    document.getElementById('vT').style.color=c.color;
    document.getElementById('btnNew').style.display=c.showNew?'':'none';
    const isItm=v==='Items';
    ['sSort','fbarMain','fbarSub','srch','vToggle'].forEach(id=>document.getElementById(id).style.display=isItm?'':'none');
    this.refresh();
  },
  refresh(){
    const v=this.cur;
    if(v==='Items'){U.rf();U.ri();}
    else if(v==='Transactions')U.rl('Transactions','bt');
    else if(v==='Restocks')U.rl('Restocks','br');
    else if(v==='Categories')U.rls('subCategories','lCat',true);
    else if(v==='Employees')U.rls('employees','lEmp',false);
    U.udl();
  }
};
const U={
  sel:'הכל', mSel:'הכל', aid:'', mode:'', vMode:localStorage.getItem('vMode')||'grid',
  logFlt:{Transactions:{emp:'',itm:''},Restocks:{itm:''}},
  setView(m){
    this.vMode=m; localStorage.setItem('vMode',m);
    document.getElementById('vGrid').style=m==='grid'?'background:var(--ci);color:#000':'color:var(--mut)';
    document.getElementById('vList').style=m==='list'?'background:var(--ci);color:#000':'color:var(--mut)';
    this.ri();
  },
  rf(){
    const mains=['הכל',...Object.keys(S.d.subCategories)];
    document.getElementById('fbarMain').innerHTML=mains.map(m=>{
      const sty=this.mSel===m?'background:var(--card);border-color:var(--ci);color:var(--ci)':'background:transparent;border-color:var(--brd);color:var(--mut)';
      return `<div onclick="U.mSel='${m}';U.sel='הכל';U.ri();U.rf()" class="pill" style="padding:6px 16px;border-width:2px;${sty}">${m}</div>`;
    }).join('');

    if(this.mSel==='הכל'){
      document.getElementById('fbarSub').style.display='none';
    }else{
      document.getElementById('fbarSub').style.display='flex';
      const subs=['הכל',...(S.d.subCategories[this.mSel]||[])];
      document.getElementById('fbarSub').innerHTML=subs.map(c=>{
        const color=S.d.colors[c];
        const style=this.sel===c?(color?`background:${color};border-color:${color};color:#000`:'background:var(--ci);border-color:var(--ci);color:#000'):(color?`color:${color};border-color:${color}`:'');
        return `<div onclick="U.sel='${c}';U.ri()" class="pill${this.sel===c?' on':''}" style="${style}">${c}</div>`;
      }).join('');
    }
  },
  ri(){
    const q=document.getElementById('srch').value.toLowerCase();
    const so=document.getElementById('sSort').value;
    let list=[...S.d.items].filter(i=>
      (i.name.toLowerCase().includes(q)||i.id.toLowerCase().includes(q))
    );
    if(this.mSel!=='הכל'){
      const allowedSubs=S.d.subCategories[this.mSel]||[];
      list=list.filter(i=>allowedSubs.includes(i.category));
      if(this.sel!=='הכל') list=list.filter(i=>i.category===this.sel);
    }

    if(so==='name')list.sort((a,b)=>a.name.localeCompare(b.name));
    if(so==='sl')list.sort((a,b)=>a.remaining-b.remaining);
    if(so==='sh')list.sort((a,b)=>b.remaining-a.remaining);

    if(this.vMode==='list'){
      document.getElementById('igrid').className="rounded-xl overflow-hidden";
      document.getElementById('igrid').style.gridTemplateColumns="";
      document.getElementById('igrid').style.border="1px solid var(--brd)";
      document.getElementById('igrid').innerHTML=list.length?`<table class="w-full"><thead><tr><th>תמונה</th><th>מזהה</th><th>שם פריט</th><th>קטגוריה</th><th>מלאי</th><th>הונפק</th><th style="text-align:center">פעולות</th></tr></thead><tbody>`+list.map(i=>{
        const iss=S.d.transactions.filter(t=>t.item===i.name).reduce((s,t)=>s+(parseInt(t.quantity)||0),0);
        const min=i.minStock||0;
        let bdg='';if(i.remaining===0)bdg='<span class="bdg lst bz">אזל!</span>';else if(i.remaining<=min)bdg='<span class="bdg lst bl">נמוך</span>';
        const img=i.img?`<img src="${i.img}" onclick="U.lb('${i.img}')" class="h-8 w-8 rounded object-cover cursor-pointer hover:opacity-80">`:'';
        return `<tr>
          <td>${img}</td>
          <td style="color:var(--mut)">${i.id}</td>
          <td class="font-bold">${bdg}${i.name} <span class="text-xs text-slate-500">(${i.id})</span></td>

const A={
  exportLog(type){
    const list = S.d[type.toLowerCase()];
    if(!list.length){T.show('אין נתונים לייצוא','er');return;}
    let csv = '\ufeffתאריך,עובד,פריט,כמות,הערות\n';
    list.forEach(r => {
      csv += `"${r.date}","${r.employee||''}","${r.item}","${r.quantity}","${r.notes||''}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${type}-${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
  },
  deleteItem(){
    const id=document.getElementById('eKey').value;
    if(!confirm('האם למחוק פריט זה? פעולה זו אינה ניתנת לביטול.')) return;
    S.save();
    S.d.items = S.d.items.filter(i=>i.id!==id);
    S.save(false);U.cm();R.refresh();T.show('הפריט נמחק');
  },
  exportJson(){
    const dataStr="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(S.d));
    const dlAnchorElem=document.createElement('a');
    dlAnchorElem.setAttribute("href",dataStr);
    dlAnchorElem.setAttribute("download",`sharara-backup-${new Date().toISOString().split('T')[0]}.json`);
    dlAnchorElem.click();
  },
  importJson(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(evt)=>{
      try{
        const data=JSON.parse(evt.target.result);
        if(!data.items||!data.transactions||!data.restocks){T.show('קובץ לא תקין','er');return;}
        S.save();S.d=data;S.save(false);R.refresh();T.show('נתונים יובאו בהצלחה');
      }catch(err){T.show('שגיאה בטעינת קובץ','er');}
    };
    reader.readAsText(file);
    e.target.value='';
  },
  saveItem(){
    const name=document.getElementById('iName').value.trim();
    const id=document.getElementById('iId').value.trim();
    const cat=document.getElementById('iCat').value;
    let stock=parseInt(document.getElementById('iStock').value);
    let minStock=parseInt(document.getElementById('iMinStock').value);
    if(isNaN(stock)) stock=0;
    if(isNaN(minStock)) minStock=0;
    if(!name){T.show('יש להזין שם פריט','er');return;}

    const k=document.getElementById('eKey').value;
    if(!k && S.d.items.find(i=>i.id===id)){T.show('ID כבר קיים','er');return;}
    S.save();

    const iImg=document.getElementById('iImg');
    const commit=(imgSrc)=>{
      if(k){
        const it=S.d.items.find(i=>i.id===k);
        if(it){
          if(id!==k && S.d.items.find(i=>i.id===id)){T.show('ID כבר קיים','er');S.undo();return;}
          it.name=name;it.id=id;it.category=cat;it.remaining=stock;it.minStock=minStock;
          if(imgSrc)it.img=imgSrc;
          S.d.transactions.forEach(t=>{if(t.item===k)t.item=id;});
          S.d.restocks.forEach(t=>{if(t.item===k)t.item=id;});
        }
      }else{
        S.d.items.push({name,id,category:cat,remaining:stock,minStock,img:imgSrc||''});
      }
      S.save(false);U.cm();R.refresh();T.show(k?'עודכן בהצלחה':'נוסף בהצלחה');
    };

    if(iImg.files[0]){const r=new FileReader();r.onload=e=>commit(e.target.result);r.readAsDataURL(iImg.files[0]);}
    else commit(null);
  },
  confirmMove(){
    const date=document.getElementById('aDate').value;
    const qty=parseInt(document.getElementById('aQty').value);
    const notes=document.getElementById('aNotes').value.trim();
    if(!date||isNaN(qty)||qty<=0){T.show('נתונים חסרים','er');return;}

    S.save();
    const it=S.d.items.find(i=>i.id===U.aid);
    if(U.mode==='out'){
      const emp=document.getElementById('aEmp').value.trim();
      if(!emp){T.show('בחר עובד','er');S.undo();return;}
      if(it.remaining<qty){T.show('אין מספיק מלאי','er');S.undo();return;}
      it.remaining-=qty;
      S.d.transactions.unshift({date,item:it.name,quantity:qty,employee:emp,notes});
      if(!S.d.employees.includes(emp)){S.d.employees.push(emp);S.d.colors[emp]='var(--ce)';}
    }else{
      it.remaining+=qty;
      S.d.restocks.unshift({date,item:it.name,quantity:qty,notes});
    }
    S.save(false);U.cm();R.refresh();T.show(U.mode==='out'?'נופק בהצלחה':'מלאי התעדכן');
  },
  eLog(type,idx,field,val){
    S.save();
    const entry=S.d[type.toLowerCase()][idx];
    if(field==='quantity'){
      const nq=parseInt(val);if(isNaN(nq)||nq<=0){T.show('כמות לא תקינה','er');S.undo();return;}
      const df=nq-entry.quantity;
      const it=S.d.items.find(i=>i.name===entry.item);
      if(it){
        if(type==='Transactions'){if(it.remaining-df<0){T.show('אין מספיק מלאי','er');S.undo();return;}it.remaining-=df;}
        else{it.remaining+=df;if(it.remaining<0)it.remaining=0;}
      }
      entry.quantity=nq;
    }
    else entry[field]=val;
    S.save(false);R.refresh();T.show('עודכן');
  },
  dLog(type,idx){
    if(!confirm('למחוק רשומה זו?'))return;
    S.save();
    const list=S.d[type.toLowerCase()];
    const entry=list[idx];
    const it=S.d.items.find(i=>i.name===entry.item);
    if(it)it.remaining+=(type==='Transactions'?entry.quantity:-entry.quantity);
    list.splice(idx,1);
    S.save(false);R.refresh();T.show('רשומה נמחקה');
  },
  changeColor(val,color){
    S.save();
    S.d.colors[val]=color;
    S.save(false);R.refresh();
  },
  addMainCat(){
    const val=document.getElementById('nMainCat').value.trim();
    if(!val){T.show('ערך לא תקין','er');return;}
    if(S.d.subCategories[val]){T.show('קבוצה קיימת','er');return;}
    S.save(); S.d.subCategories[val]=[]; S.save(false); R.refresh(); document.getElementById('nMainCat').value=''; T.show('קבוצה נוצרה');
  },
  addSubCat(main){
    const val=document.getElementById('nCat_'+main).value.trim();
    const color=document.getElementById('nCatColor_'+main).value;
    if(!val){T.show('ערך לא תקין','er');return;}
    let exists=false; for(const m in S.d.subCategories) if(S.d.subCategories[m].includes(val)) exists=true;
    if(exists){T.show('שם קיים','er');return;}
    S.save(); S.d.subCategories[main].push(val); if(color)S.d.colors[val]=color; S.save(false); R.refresh(); T.show('נוסף בהצלחה');
  },
  addList(key,inputId,colorId){
    const val=document.getElementById(inputId).value.trim();
    const color=document.getElementById(colorId)?.value;
    if(!val||typeof val!=='string'){T.show('ערך לא תקין','er');return;}
    if(S.d[key].includes(val)){T.show('כבר קיים','er');return;}
    S.save();S.d[key].push(val);
    if(color) S.d.colors[val]=color;
    document.getElementById(inputId).value='';
    S.save(false);R.refresh();T.show('נוסף בהצלחה');
  },
  editList(type,oldVal,main){
    const newVal=prompt('ערוך שם:',oldVal);
    if(!newVal||newVal.trim()===''||newVal===oldVal)return;
    const val=newVal.trim();
    S.save();
    if(type==='mainCat'){
      if(S.d.subCategories[val]){T.show('קבוצה קיימת','er');S.undo();return;}
      S.d.subCategories[val]=S.d.subCategories[oldVal];
      delete S.d.subCategories[oldVal];
      if(U.mSel===oldVal)U.mSel=val;
    }else if(type==='subCat'){
      let exists=false; for(const m in S.d.subCategories) if(S.d.subCategories[m].includes(val)) exists=true;
      if(exists){T.show('שם קיים במערכת','er');S.undo();return;}
      const idx=S.d.subCategories[main].indexOf(oldVal);
      if(idx>-1)S.d.subCategories[main][idx]=val;
      if(S.d.colors[oldVal]){S.d.colors[val]=S.d.colors[oldVal];delete S.d.colors[oldVal];}
      S.d.items.forEach(i=>{if(i.category===oldVal)i.category=val;});
      if(U.sel===oldVal)U.sel=val;
    }else{
      if(S.d[type].includes(val)){T.show('שם כבר קיים','er');S.undo();return;}
      const idx=S.d[type].indexOf(oldVal);
      if(idx>-1)S.d[type][idx]=val;
      if(S.d.colors[oldVal]){S.d.colors[val]=S.d.colors[oldVal];delete S.d.colors[oldVal];}
      S.d.transactions.forEach(t=>{if(t.employee===oldVal)t.employee=val;});
    }
    S.save(false);R.refresh();T.show('עודכן בהצלחה');
  },
  removeList(type,val,main){
    if(!confirm(`למחוק "${val}"?`))return;
    S.save();
    if(type==='mainCat'){
      if(S.d.subCategories[val].length>0){T.show('לא ניתן למחוק קבוצה עם פריטים','er');S.undo();return;}
      delete S.d.subCategories[val];
      if(U.mSel===val)U.mSel='הכל';
    }else if(type==='subCat'){
      S.d.subCategories[main]=S.d.subCategories[main].filter(x=>x!==val);
      if(U.sel===val)U.sel='הכל';
    }else{
      S.d[type]=S.d[type].filter(x=>x!==val);
    }
    S.save(false);R.refresh();T.show('נמחק');
  },
  dragSt(e,c){e.dataTransfer.setData('text/plain',c);e.target.classList.add('opacity-50');},
  drop(e,tgt){
    const src=e.dataTransfer.getData('text/plain');
    if(src===tgt)return;
    S.save();
    // This drag/drop is disabled in UI for now since categories are grouped, but left for future.
    S.save(false);R.refresh();
  }
};

window.onload=()=>{
  R.go('Items');
};
</script></body></html>
